<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cálculo de Salário</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cálculo de Salário</h1>

    <form name="frmsalario" action="calcularsalario.php" method="POST">

      <div class="campo">
        <label for="txthoras">Digite a quantidade de horas trabalhadas:</label>
        <input type="number" id="txthoras" name="txthoras" min="0" step="1" required>
      </div>

      <div class="campo">
        <label for="txtvalor">Digite o valor da hora (R$):</label>
        <input type="number" id="txtvalor" name="txtvalor" min="0" step="0.01" required>
      </div>

      <div class="botoes">
        <input type="submit" value="Calcular Salário">
        <input type="reset" value="Limpar">
      </div>

    </form>
  </div>

</body>
</html>
